<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <pattern id="dotgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" rx="12" fill="#080810"/>
  <rect width="1200" height="700" rx="12" fill="url(#dotgrid)"/>

  <!-- ===== Node 1: Load Checkpoint (orange header) ===== -->
  <!-- Shadow -->
  <rect x="63" y="83" width="240" height="145" rx="8" fill="rgba(0,0,0,0.45)"/>
  <!-- Body -->
  <rect x="60" y="80" width="240" height="145" rx="8" fill="#13131f" stroke="rgba(255,255,255,0.12)"/>
  <!-- Header -->
  <rect x="60" y="80" width="240" height="32" rx="8" fill="rgba(251,146,60,0.9)"/>
  <rect x="60" y="100" width="240" height="12" fill="rgba(251,146,60,0.9)"/>
  <text x="76" y="101" font-family="monospace" font-size="12" fill="rgba(0,0,0,0.85)" font-weight="600">Load Checkpoint</text>
  <text x="282" y="101" font-family="monospace" font-size="12" fill="rgba(0,0,0,0.6)" text-anchor="end">−</text>
  <!-- Output port: MODEL -->
  <circle cx="301" cy="132" r="5.5" fill="#fb923c" stroke="#fb923c" stroke-width="2"/>
  <text x="286" y="136" font-family="monospace" font-size="10" fill="#fb923c" text-anchor="end">model</text>
  <!-- Output port: CLIP -->
  <circle cx="301" cy="156" r="5.5" fill="#facc15" stroke="#facc15" stroke-width="2"/>
  <text x="286" y="160" font-family="monospace" font-size="10" fill="#facc15" text-anchor="end">clip</text>
  <!-- Output port: VAE -->
  <circle cx="301" cy="180" r="5.5" fill="#f87171" stroke="#f87171" stroke-width="2"/>
  <text x="286" y="184" font-family="monospace" font-size="10" fill="#f87171" text-anchor="end">vae</text>
  <!-- Param -->
  <text x="76" y="132" font-family="monospace" font-size="9" fill="#64748b">CKPT</text>
  <rect x="108" y="120" width="130" height="22" rx="4" fill="#0f0f1a" stroke="rgba(255,255,255,0.1)"/>
  <text x="116" y="135" font-family="monospace" font-size="10" fill="#e2e8f0">v1-5-pruned.ckpt</text>

  <!-- ===== Node 2: CLIP Text Encode (positive, yellow) ===== -->
  <rect x="363" y="63" width="240" height="120" rx="8" fill="rgba(0,0,0,0.45)"/>
  <rect x="360" y="60" width="240" height="120" rx="8" fill="#13131f" stroke="rgba(255,255,255,0.12)"/>
  <rect x="360" y="60" width="240" height="32" rx="8" fill="rgba(250,204,21,0.9)"/>
  <rect x="360" y="80" width="240" height="12" fill="rgba(250,204,21,0.9)"/>
  <text x="376" y="81" font-family="monospace" font-size="12" fill="rgba(0,0,0,0.85)" font-weight="600">CLIP Text Encode</text>
  <text x="582" y="81" font-family="monospace" font-size="12" fill="rgba(0,0,0,0.6)" text-anchor="end">−</text>
  <!-- Input: clip -->
  <circle cx="359" cy="112" r="5.5" fill="#facc15" stroke="#facc15" stroke-width="2"/>
  <text x="374" y="116" font-family="monospace" font-size="10" fill="#facc15">clip</text>
  <!-- Output: conditioning -->
  <circle cx="601" cy="112" r="5.5" fill="#fb923c" stroke="#fb923c" stroke-width="2"/>
  <text x="586" y="116" font-family="monospace" font-size="10" fill="#fb923c" text-anchor="end">cond</text>
  <!-- Param: text -->
  <text x="376" y="144" font-family="monospace" font-size="9" fill="#64748b">TEXT</text>
  <rect x="376" y="148" width="208" height="22" rx="4" fill="#0f0f1a" stroke="rgba(255,255,255,0.1)"/>
  <text x="384" y="163" font-family="monospace" font-size="10" fill="#e2e8f0">a beautiful landscape</text>

  <!-- ===== Node 3: CLIP Text Encode (negative, yellow) ===== -->
  <rect x="363" y="213" width="240" height="120" rx="8" fill="rgba(0,0,0,0.45)"/>
  <rect x="360" y="210" width="240" height="120" rx="8" fill="#13131f" stroke="rgba(255,255,255,0.12)"/>
  <rect x="360" y="210" width="240" height="32" rx="8" fill="rgba(250,204,21,0.9)"/>
  <rect x="360" y="230" width="240" height="12" fill="rgba(250,204,21,0.9)"/>
  <text x="376" y="231" font-family="monospace" font-size="12" fill="rgba(0,0,0,0.85)" font-weight="600">CLIP Text Encode</text>
  <text x="582" y="231" font-family="monospace" font-size="12" fill="rgba(0,0,0,0.6)" text-anchor="end">−</text>
  <circle cx="359" cy="262" r="5.5" fill="#facc15" stroke="#facc15" stroke-width="2"/>
  <text x="374" y="266" font-family="monospace" font-size="10" fill="#facc15">clip</text>
  <circle cx="601" cy="262" r="5.5" fill="#fb923c" stroke="#fb923c" stroke-width="2"/>
  <text x="586" y="266" font-family="monospace" font-size="10" fill="#fb923c" text-anchor="end">cond</text>
  <text x="376" y="294" font-family="monospace" font-size="9" fill="#64748b">TEXT</text>
  <rect x="376" y="298" width="208" height="22" rx="4" fill="#0f0f1a" stroke="rgba(255,255,255,0.1)"/>
  <text x="384" y="313" font-family="monospace" font-size="10" fill="#e2e8f0">ugly, blurry, low quality</text>

  <!-- ===== Node 4: Empty Latent Image (purple) ===== -->
  <rect x="363" y="393" width="240" height="140" rx="8" fill="rgba(0,0,0,0.45)"/>
  <rect x="360" y="390" width="240" height="140" rx="8" fill="#13131f" stroke="rgba(255,255,255,0.12)"/>
  <rect x="360" y="390" width="240" height="32" rx="8" fill="rgba(192,132,252,0.9)"/>
  <rect x="360" y="410" width="240" height="12" fill="rgba(192,132,252,0.9)"/>
  <text x="376" y="411" font-family="monospace" font-size="12" fill="rgba(0,0,0,0.85)" font-weight="600">Empty Latent Image</text>
  <circle cx="601" cy="444" r="5.5" fill="#c084fc" stroke="#c084fc" stroke-width="2"/>
  <text x="586" y="448" font-family="monospace" font-size="10" fill="#c084fc" text-anchor="end">latent</text>
  <text x="376" y="452" font-family="monospace" font-size="9" fill="#64748b">W</text>
  <rect x="400" y="440" width="60" height="22" rx="4" fill="#0f0f1a" stroke="rgba(255,255,255,0.1)"/>
  <text x="408" y="455" font-family="monospace" font-size="10" fill="#e2e8f0">512</text>
  <text x="376" y="480" font-family="monospace" font-size="9" fill="#64748b">H</text>
  <rect x="400" y="468" width="60" height="22" rx="4" fill="#0f0f1a" stroke="rgba(255,255,255,0.1)"/>
  <text x="408" y="483" font-family="monospace" font-size="10" fill="#e2e8f0">512</text>
  <text x="376" y="510" font-family="monospace" font-size="9" fill="#64748b">BATCH</text>
  <rect x="420" y="498" width="40" height="22" rx="4" fill="#0f0f1a" stroke="rgba(255,255,255,0.1)"/>
  <text x="428" y="513" font-family="monospace" font-size="10" fill="#e2e8f0">1</text>

  <!-- ===== Node 5: KSampler (indigo) ===== -->
  <rect x="683" y="183" width="240" height="200" rx="8" fill="rgba(0,0,0,0.45)"/>
  <rect x="680" y="180" width="240" height="200" rx="8" fill="#13131f" stroke="white" stroke-width="1.5"/>
  <rect x="680" y="180" width="240" height="32" rx="8" fill="rgba(129,140,248,0.9)"/>
  <rect x="680" y="200" width="240" height="12" fill="rgba(129,140,248,0.9)"/>
  <text x="696" y="201" font-family="monospace" font-size="12" fill="rgba(0,0,0,0.85)" font-weight="600">KSampler</text>
  <text x="902" y="201" font-family="monospace" font-size="12" fill="rgba(0,0,0,0.6)" text-anchor="end">−</text>
  <!-- Inputs -->
  <circle cx="679" cy="232" r="5.5" fill="#fb923c" stroke="#fb923c" stroke-width="2"/>
  <text x="694" y="236" font-family="monospace" font-size="10" fill="#fb923c">model</text>
  <circle cx="679" cy="256" r="5.5" fill="#fb923c" stroke="#fb923c" stroke-width="2"/>
  <text x="694" y="260" font-family="monospace" font-size="10" fill="#fb923c">positive</text>
  <circle cx="679" cy="280" r="5.5" fill="#fb923c" stroke="#fb923c" stroke-width="2"/>
  <text x="694" y="284" font-family="monospace" font-size="10" fill="#fb923c">negative</text>
  <circle cx="679" cy="304" r="5.5" fill="#c084fc" stroke="#c084fc" stroke-width="2"/>
  <text x="694" y="308" font-family="monospace" font-size="10" fill="#c084fc">latent</text>
  <!-- Output -->
  <circle cx="921" cy="232" r="5.5" fill="#c084fc" stroke="#c084fc" stroke-width="2"/>
  <text x="906" y="236" font-family="monospace" font-size="10" fill="#c084fc" text-anchor="end">latent</text>
  <!-- Params -->
  <text x="696" y="332" font-family="monospace" font-size="9" fill="#64748b">SEED</text>
  <rect x="730" y="320" width="80" height="22" rx="4" fill="#0f0f1a" stroke="rgba(255,255,255,0.1)"/>
  <text x="738" y="335" font-family="monospace" font-size="10" fill="#e2e8f0">156680</text>
  <text x="696" y="358" font-family="monospace" font-size="9" fill="#64748b">STEPS</text>
  <rect x="740" y="346" width="50" height="22" rx="4" fill="#0f0f1a" stroke="rgba(255,255,255,0.1)"/>
  <text x="748" y="361" font-family="monospace" font-size="10" fill="#e2e8f0">20</text>

  <!-- ===== Node 6: VAE Decode (red) ===== -->
  <rect x="1003" y="263" width="240" height="110" rx="8" fill="rgba(0,0,0,0.45)"/>
  <rect x="1000" y="260" width="240" height="110" rx="8" fill="#13131f" stroke="rgba(255,255,255,0.12)"/>
  <rect x="1000" y="260" width="240" height="32" rx="8" fill="rgba(248,113,113,0.9)"/>
  <rect x="1000" y="280" width="240" height="12" fill="rgba(248,113,113,0.9)"/>
  <text x="1016" y="281" font-family="monospace" font-size="12" fill="rgba(0,0,0,0.85)" font-weight="600">VAE Decode</text>
  <!-- Inputs -->
  <circle cx="999" cy="312" r="5.5" fill="#c084fc" stroke="#c084fc" stroke-width="2"/>
  <text x="1014" y="316" font-family="monospace" font-size="10" fill="#c084fc">latent</text>
  <circle cx="999" cy="336" r="5.5" fill="#f87171" stroke="#f87171" stroke-width="2"/>
  <text x="1014" y="340" font-family="monospace" font-size="10" fill="#f87171">vae</text>
  <!-- Output -->
  <circle cx="1241" cy="312" r="5.5" fill="#4ade80" stroke="#4ade80" stroke-width="2"/>
  <text x="1226" y="316" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="end">image</text>

  <!-- ===== Wires (bezier curves) ===== -->
  <!-- Load Checkpoint model → KSampler model -->
  <path d="M301,132 C420,132 560,232 679,232" fill="none" stroke="#fb923c" stroke-width="2.5" opacity="0.85"/>
  <!-- Load Checkpoint clip → CLIP positive clip -->
  <path d="M301,156 C320,156 340,112 359,112" fill="none" stroke="#facc15" stroke-width="2.5" opacity="0.85"/>
  <!-- Load Checkpoint clip → CLIP negative clip -->
  <path d="M301,156 C320,156 340,262 359,262" fill="none" stroke="#facc15" stroke-width="2.5" opacity="0.85"/>
  <!-- Load Checkpoint vae → VAE Decode vae -->
  <path d="M301,180 C500,180 800,336 999,336" fill="none" stroke="#f87171" stroke-width="2.5" opacity="0.85"/>
  <!-- CLIP positive cond → KSampler positive -->
  <path d="M601,112 C640,112 640,256 679,256" fill="none" stroke="#fb923c" stroke-width="2.5" opacity="0.85"/>
  <!-- CLIP negative cond → KSampler negative -->
  <path d="M601,262 C640,262 640,280 679,280" fill="none" stroke="#fb923c" stroke-width="2.5" opacity="0.85"/>
  <!-- Empty Latent → KSampler latent -->
  <path d="M601,444 C640,444 640,304 679,304" fill="none" stroke="#c084fc" stroke-width="2.5" opacity="0.85"/>
  <!-- KSampler latent → VAE Decode latent -->
  <path d="M921,232 C960,232 960,312 999,312" fill="none" stroke="#c084fc" stroke-width="2.5" opacity="0.85"/>

  <!-- ===== Toolbar (top-right) ===== -->
  <rect x="960" y="14" width="220" height="36" rx="8" fill="rgba(15,15,26,0.85)" stroke="rgba(255,255,255,0.08)"/>
  <rect x="968" y="20" width="60" height="24" rx="6" fill="rgba(99,102,241,0.3)" stroke="rgba(99,102,241,0.5)"/>
  <text x="998" y="36" font-family="monospace" font-size="11" fill="#818cf8" text-anchor="middle">+ ADD</text>
  <text x="1068" y="36" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">100%</text>
  <rect x="1110" y="20" width="58" height="24" rx="6" fill="none" stroke="rgba(255,255,255,0.08)"/>
  <text x="1139" y="36" font-family="monospace" font-size="9" fill="#475569" text-anchor="middle">RESET</text>

  <!-- ===== Port type legend (bottom-left) ===== -->
  <rect x="14" y="560" width="360" height="126" rx="8" fill="rgba(13,13,25,0.9)" stroke="rgba(255,255,255,0.07)"/>
  <circle cx="30" cy="580" r="4" fill="#4ade80"/><text x="42" y="584" font-family="monospace" font-size="9" fill="#475569">IMAGE</text>
  <circle cx="100" cy="580" r="4" fill="#c084fc"/><text x="112" y="584" font-family="monospace" font-size="9" fill="#475569">LATENT</text>
  <circle cx="178" cy="580" r="4" fill="#fb923c"/><text x="190" y="584" font-family="monospace" font-size="9" fill="#475569">MODEL</text>
  <circle cx="250" cy="580" r="4" fill="#facc15"/><text x="262" y="584" font-family="monospace" font-size="9" fill="#475569">CLIP</text>
  <circle cx="310" cy="580" r="4" fill="#f87171"/><text x="322" y="584" font-family="monospace" font-size="9" fill="#475569">VAE</text>
  <circle cx="30" cy="600" r="4" fill="#38bdf8"/><text x="42" y="604" font-family="monospace" font-size="9" fill="#475569">INT</text>
  <circle cx="100" cy="600" r="4" fill="#818cf8"/><text x="112" y="604" font-family="monospace" font-size="9" fill="#475569">FLOAT</text>
  <circle cx="178" cy="600" r="4" fill="#a8a29e"/><text x="190" y="604" font-family="monospace" font-size="9" fill="#475569">STRING</text>
  <circle cx="250" cy="600" r="4" fill="#2dd4bf"/><text x="262" y="604" font-family="monospace" font-size="9" fill="#475569">MASK</text>
</svg>
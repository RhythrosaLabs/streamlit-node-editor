<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0e0e1c"/><stop offset="100%" stop-color="#08080f"/></linearGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="900" height="520" rx="14" fill="url(#bg)" stroke="rgba(255,255,255,0.06)"/>
  <!-- Dot grid -->
  <rect x="0" y="40" width="900" height="480" fill="url(#dots)"/>
  <!-- Toolbar -->
  <rect x="0" y="0" width="900" height="40" rx="14" fill="#0e0e1c"/>
  <rect x="0" y="14" width="900" height="26" fill="#0e0e1c"/>
  <line x1="0" y1="40" x2="900" y2="40" stroke="rgba(255,255,255,0.06)"/>
  <text x="20" y="26" font-family="sans-serif" font-size="13" fill="#e2e8f0" font-weight="700">Node Editor</text>
  <rect x="114" y="12" width="70" height="20" rx="6" fill="rgba(129,140,248,0.1)" stroke="rgba(129,140,248,0.3)"/>
  <text x="149" y="26" font-family="sans-serif" font-size="9" fill="#818cf8" text-anchor="middle">+ Add Node</text>
  <rect x="190" y="12" width="56" height="20" rx="6" fill="rgba(255,255,255,0.03)"/>
  <text x="218" y="26" font-family="sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">🔍 Search</text>
  <text x="780" y="26" font-family="sans-serif" font-size="9" fill="#475569">3 nodes · 2 wires</text>
  <!-- Node 1: CSV Source (green header) -->
  <g transform="translate(60,80)">
    <rect x="0" y="0" width="200" height="140" rx="10" fill="rgba(10,10,20,0.9)" stroke="rgba(255,255,255,0.08)"/>
    <!-- Header -->
    <rect x="0" y="0" width="200" height="32" rx="10" fill="#4ade80"/>
    <rect x="0" y="14" width="200" height="18" fill="#4ade80"/>
    <text x="14" y="21" font-family="sans-serif" font-size="11" fill="#0f172a" font-weight="700">CSV Source</text>
    <text x="170" y="21" font-family="sans-serif" font-size="9" fill="rgba(0,0,0,0.4)">Sources</text>
    <!-- Params -->
    <text x="14" y="52" font-family="sans-serif" font-size="9" fill="#94a3b8">File path</text>
    <rect x="14" y="58" width="172" height="22" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
    <text x="22" y="73" font-family="sans-serif" font-size="9" fill="#e2e8f0">data.csv</text>
    <text x="14" y="96" font-family="sans-serif" font-size="9" fill="#94a3b8">Separator</text>
    <rect x="14" y="102" width="172" height="22" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
    <text x="22" y="117" font-family="sans-serif" font-size="9" fill="#e2e8f0">,</text>
    <!-- Output port -->
    <circle cx="200" cy="50" r="7" fill="#4ade80" stroke="#0e0e1c" stroke-width="2"/>
    <text x="184" y="54" font-family="sans-serif" font-size="7" fill="#4ade80" text-anchor="end">dataframe</text>
  </g>
  <!-- Node 2: Filter Rows (blue header) -->
  <g transform="translate(380,120)">
    <rect x="0" y="0" width="200" height="120" rx="10" fill="rgba(10,10,20,0.9)" stroke="rgba(129,140,248,0.3)"/>
    <!-- Selected glow -->
    <rect x="-2" y="-2" width="204" height="124" rx="12" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.6"/>
    <!-- Header -->
    <rect x="0" y="0" width="200" height="32" rx="10" fill="#38bdf8"/>
    <rect x="0" y="14" width="200" height="18" fill="#38bdf8"/>
    <text x="14" y="21" font-family="sans-serif" font-size="11" fill="#0f172a" font-weight="700">Filter Rows</text>
    <text x="158" y="21" font-family="sans-serif" font-size="9" fill="rgba(0,0,0,0.4)">Transform</text>
    <!-- Input port -->
    <circle cx="0" cy="50" r="7" fill="#4ade80" stroke="#0e0e1c" stroke-width="2"/>
    <text x="16" y="54" font-family="sans-serif" font-size="7" fill="#4ade80">df_in</text>
    <!-- Params -->
    <text x="14" y="72" font-family="sans-serif" font-size="9" fill="#94a3b8">Query expr</text>
    <rect x="14" y="78" width="172" height="22" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
    <text x="22" y="93" font-family="sans-serif" font-size="9" fill="#e2e8f0">value &gt; 0</text>
    <!-- Output port -->
    <circle cx="200" cy="50" r="7" fill="#4ade80" stroke="#0e0e1c" stroke-width="2"/>
    <text x="184" y="54" font-family="sans-serif" font-size="7" fill="#4ade80" text-anchor="end">df_out</text>
  </g>
  <!-- Node 3: Bar Chart (orange header) -->
  <g transform="translate(680,200)">
    <rect x="0" y="0" width="190" height="140" rx="10" fill="rgba(10,10,20,0.9)" stroke="rgba(255,255,255,0.08)"/>
    <!-- Header -->
    <rect x="0" y="0" width="190" height="32" rx="10" fill="#fb923c"/>
    <rect x="0" y="14" width="190" height="18" fill="#fb923c"/>
    <text x="14" y="21" font-family="sans-serif" font-size="11" fill="#0f172a" font-weight="700">Bar Chart</text>
    <text x="155" y="21" font-family="sans-serif" font-size="9" fill="rgba(0,0,0,0.4)">Outputs</text>
    <!-- Input port -->
    <circle cx="0" cy="50" r="7" fill="#4ade80" stroke="#0e0e1c" stroke-width="2"/>
    <text x="16" y="54" font-family="sans-serif" font-size="7" fill="#4ade80">dataframe</text>
    <!-- Params -->
    <text x="14" y="72" font-family="sans-serif" font-size="9" fill="#94a3b8">X column</text>
    <rect x="14" y="78" width="162" height="22" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
    <text x="22" y="93" font-family="sans-serif" font-size="9" fill="#e2e8f0">date</text>
    <text x="14" y="114" font-family="sans-serif" font-size="9" fill="#94a3b8">Y column</text>
    <rect x="14" y="120" width="162" height="22" rx="5" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
    <text x="22" y="135" font-family="sans-serif" font-size="9" fill="#e2e8f0">revenue</text>
  </g>
  <!-- Wire 1: CSV Source -> Filter Rows -->
  <path d="M260,130 C320,130 320,170 380,170" stroke="#4ade80" stroke-width="2.5" fill="none" opacity="0.6"/>
  <!-- Animated dots on wire -->
  <circle r="3" fill="#4ade80" opacity="0.8">
    <animateMotion dur="2s" repeatCount="indefinite" path="M260,130 C320,130 320,170 380,170"/>
  </circle>
  <!-- Wire 2: Filter Rows -> Bar Chart -->
  <path d="M580,170 C630,170 630,250 680,250" stroke="#4ade80" stroke-width="2.5" fill="none" opacity="0.6"/>
  <circle r="3" fill="#4ade80" opacity="0.8">
    <animateMotion dur="2s" repeatCount="indefinite" path="M580,170 C630,170 630,250 680,250"/>
  </circle>
  <!-- Node palette (collapsed, floating) -->
  <rect x="30" y="320" width="180" height="170" rx="10" fill="rgba(10,10,20,0.95)" stroke="rgba(255,255,255,0.08)"/>
  <text x="44" y="340" font-family="sans-serif" font-size="10" fill="#e2e8f0" font-weight="600">Node Palette</text>
  <rect x="40" y="348" width="160" height="22" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)"/>
  <text x="52" y="363" font-family="sans-serif" font-size="9" fill="#475569">🔍 Search nodes…</text>
  <text x="44" y="384" font-family="sans-serif" font-size="8" fill="#475569" letter-spacing="1" font-weight="600">SOURCES</text>
  <text x="52" y="400" font-family="sans-serif" font-size="9" fill="#e2e8f0">CSV Source</text>
  <text x="52" y="414" font-family="sans-serif" font-size="9" fill="#e2e8f0">API Fetch</text>
  <text x="44" y="432" font-family="sans-serif" font-size="8" fill="#475569" letter-spacing="1" font-weight="600">TRANSFORM</text>
  <text x="52" y="448" font-family="sans-serif" font-size="9" fill="#e2e8f0">Filter Rows</text>
  <text x="52" y="462" font-family="sans-serif" font-size="9" fill="#e2e8f0">Group By</text>
  <text x="52" y="476" font-family="sans-serif" font-size="9" fill="#94a3b8">…</text>
  <!-- Port type legend -->
  <g transform="translate(660,400)">
    <rect x="0" y="0" width="210" height="90" rx="8" fill="rgba(10,10,20,0.9)" stroke="rgba(255,255,255,0.06)"/>
    <text x="14" y="18" font-family="sans-serif" font-size="8" fill="#475569" letter-spacing="1" font-weight="600">PORT TYPES</text>
    <circle cx="20" cy="34" r="4" fill="#4ade80"/><text x="30" y="38" font-family="sans-serif" font-size="8" fill="#94a3b8">DATAFRAME</text>
    <circle cx="110" cy="34" r="4" fill="#a78bfa"/><text x="120" y="38" font-family="sans-serif" font-size="8" fill="#94a3b8">LATENT</text>
    <circle cx="20" cy="52" r="4" fill="#fb923c"/><text x="30" y="56" font-family="sans-serif" font-size="8" fill="#94a3b8">MODEL</text>
    <circle cx="110" cy="52" r="4" fill="#facc15"/><text x="120" y="56" font-family="sans-serif" font-size="8" fill="#94a3b8">CLIP</text>
    <circle cx="20" cy="70" r="4" fill="#818cf8"/><text x="30" y="74" font-family="sans-serif" font-size="8" fill="#94a3b8">FLOAT</text>
    <circle cx="110" cy="70" r="4" fill="#94a3b8"/><text x="120" y="74" font-family="sans-serif" font-size="8" fill="#94a3b8">STRING</text>
  </g>
  <!-- Footer -->
  <text x="450" y="510" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.15)" text-anchor="middle">Drag to connect ports · Click wire to delete · Delete/Backspace removes node · Right-click for palette · Scroll to zoom</text>
</svg>
